# ============================================================
# Unraid Arr Stack — docker-compose.yml
# ============================================================
# Aktive Dienste:
#   VPN       : Tailscale   (Remote-Zugriff)
#   Usenet    : SABnzbd
#   Indexer   : Prowlarr
#   Filme     : Radarr
#   Serien    : Sonarr
#   Untertitel: Bazarr
#   Requests  : Seerr
#   Player    : Jellyfin
#   Dashboard : Homepage
#
# Deaktivierte Dienste (Compose-Profile, bei Bedarf zuschalten):
#   --profile vaultwarden : Vaultwarden (Passwort-Manager)
#   --profile adguard     : AdGuard Home (DNS)
#   --profile iptv        : Threadfin (Live TV)
#   --profile lidarr      : Lidarr (Musik)
#   --profile readarr     : Readarr (Bücher)
# ============================================================
# Nutzung:
#   1. cp .env.example .env  &&  .env ausfüllen
#   2. bash bootstrap.sh      (Ordner, Netzwerk, Start, Health-Wait, API-Config)
# ============================================================
# Image-Tags sind FEST GEPINNT (Stand 2026-07-16, gegen Registry
# verifiziert). Update = Tag hier bumpen, committen, `docker compose up -d`.
# ============================================================

name: arr-stack

x-common: &common
  restart: unless-stopped
  environment:
    - PUID=${PUID:-99}
    - PGID=${PGID:-100}
    - TZ=${TZ:-Europe/Berlin}

# Hinweis: Ein expliziter environment-Block ERSETZT den Block aus x-common
# vollständig (YAML-Merge ist kein Deep-Merge) — dort PUID/PGID/TZ wiederholen.

networks:
  arr_net:
    external: true
    name: arr_net

# ---------------------------------------------------------------------------
# VOLUMES — benannte Volumes als Bind auf ${APPDATA}/<dienst>
# ---------------------------------------------------------------------------
volumes:
  tailscale_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/tailscale" }
  sabnzbd_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/sabnzbd" }
  prowlarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/prowlarr" }
  radarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/radarr" }
  sonarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/sonarr" }
  lidarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/lidarr" }
  readarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/readarr" }
  bazarr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/bazarr" }
  seerr_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/seerr" }
  vaultwarden_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/vaultwarden" }
  threadfin_conf:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/threadfin/conf" }
  threadfin_temp:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/threadfin/temp" }
  gluetun_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/gluetun" }
  qbittorrent_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/qbittorrent" }
  adguard_work:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/adguardhome/work" }
  adguard_conf:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/adguardhome/conf" }
  jellyfin_config:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/jellyfin/config" }
  jellyfin_cache:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/jellyfin/cache" }
  homepage_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${APPDATA}/homepage" }

# ---------------------------------------------------------------------------
services:
  # ==========================================================================
  # TAILSCALE — Remote-Zugriff (host-Netz, erreicht alle veröffentlichten Ports)
  # Auth: TS_AUTHKEY in .env (tskey-auth-…) oder interaktiv via docker logs.
  # ==========================================================================
  tailscale:
    image: tailscale/tailscale:v1.98.9
    container_name: tailscale
    hostname: ${TS_HOSTNAME:-arr-stack}
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale_data:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    healthcheck:
      # Achtung: JSON-Ausgabe enthält ein Leerzeichen nach dem Doppelpunkt
      test: ["CMD-SHELL", "tailscale status --json | grep -q '\"BackendState\": *\"Running\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # SABnzbd — Usenet-Downloader
  # Mountet wie Radarr/Sonarr das komplette ${DATA} als /data (TRaSH-Layout):
  # gleiche Pfade in allen Apps → keine Remote Path Mappings, Hardlinks möglich.
  # Download-Ordner (per API gesetzt): /data/downloads/usenet/{incomplete,complete}
  # ==========================================================================
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.4-ls262
    container_name: sabnzbd
    <<: *common
    ports:
      - "${SABNZBD_PORT:-8090}:8080"
    volumes:
      - sabnzbd_data:/config
      - ${DATA}:/data
    networks:
      - arr_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:8080/api?mode=version' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # PROWLARR — Indexer-Manager (Single Source of Truth, synct zu Radarr/Sonarr)
  # ==========================================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls154
    container_name: prowlarr
    <<: *common
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    volumes:
      - prowlarr_data:/config
    networks:
      - arr_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ping >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # RADARR — Filme
  # ==========================================================================
  radarr:
    image: lscr.io/linuxserver/radarr:6.3.0.10514-ls311
    container_name: radarr
    <<: *common
    ports:
      - "${RADARR_PORT:-7878}:7878"
    volumes:
      - radarr_data:/config
      - ${DATA}:/data
    networks:
      - arr_net
    depends_on:
      prowlarr:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7878/ping >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # SONARR — Serien
  # ==========================================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19.2979-ls319
    container_name: sonarr
    <<: *common
    ports:
      - "${SONARR_PORT:-8989}:8989"
    volumes:
      - sonarr_data:/config
      - ${DATA}:/data
    networks:
      - arr_net
    depends_on:
      prowlarr:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8989/ping >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # BAZARR — Untertitel (braucht nur die fertigen Medien, kein /downloads)
  # ==========================================================================
  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.6.0-ls355
    container_name: bazarr
    <<: *common
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    volumes:
      - bazarr_data:/config
      - ${DATA}/media:/data/media
    networks:
      - arr_net
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs -o /dev/null http://localhost:6767"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # SEERR — Media-Request-Portal (läuft als interner node-User, kein PUID/PGID)
  # ==========================================================================
  seerr:
    image: seerr/seerr:v3.3.0
    container_name: seerr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Berlin}
    ports:
      - "${SEERR_PORT:-5055}:5055"
    volumes:
      - seerr_data:/app/config
    networks:
      - arr_net
    depends_on:
      jellyfin:
        condition: service_healthy
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # JELLYFIN — Media-Server (bringt eigenen Healthcheck im Image mit)
  # ==========================================================================
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID:-99}:${PGID:-100}"
    ports:
      - "${JELLYFIN_PORT_HTTP:-8096}:8096"
      - "${JELLYFIN_PORT_HTTPS:-8920}:8920"
      # Auto-Discovery-Backend: nur auf localhost veröffentlicht — die
      # LAN-Broadcasts nimmt jellyfin-discovery (s. u.) entgegen, weil
      # docker-proxy Antworten auf Broadcast-Anfragen nicht zurückrelayt.
      - "127.0.0.1:7360:7359/udp"
      # DLNA/SSDP bewusst aus (kollidiert mit Unraid-Diensten):
      # - "1900:1900/udp"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${DATA}/media:/data/media:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - JELLYFIN_PublishedServerUrl=http://${UNRAID_IP:-192.168.1.100}:${JELLYFIN_PORT_HTTP:-8096}
    # Hardware-Transcoding: Intel QuickSync (iGPU des N150, /dev/dri ist auf
    # Unraid world-rw — kein group_add nötig, obwohl der Container als 99:100 läuft)
    devices:
      - /dev/dri:/dev/dri
    networks:
      - arr_net

  # jellyfin-discovery — Auto-Discovery-Relay: Jellyfin-Apps finden den Server
  # im LAN per UDP-Broadcast auf 7359 ("Who is JellyfinServer?"). Broadcasts
  # erreichen den Container über eine veröffentlichte Bridge-Portfreigabe zwar,
  # aber docker-proxy relayt Jellyfins Antwort nicht zum Client zurück
  # (verifiziert per tcpdump). Dieser socat im Host-Netz nimmt den Broadcast an
  # und relayt Anfrage + Antwort per Unicast an Jellyfin (127.0.0.1:7360).
  jellyfin-discovery:
    image: alpine/socat:1.8.1.3
    container_name: jellyfin-discovery
    restart: unless-stopped
    network_mode: host
    command: ["-T", "5", "UDP4-RECVFROM:7359,fork,reuseaddr", "UDP4-SENDTO:127.0.0.1:7360"]
    depends_on:
      - jellyfin

  # ==========================================================================
  # HOMEPAGE — Dashboard (bringt eigenen Healthcheck im Image mit)
  # ==========================================================================
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - homepage_data:/app/config
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - TZ=${TZ:-Europe/Berlin}
      - HOMEPAGE_VAR_UNRAID_IP=${UNRAID_IP:-192.168.1.100}
      # Ohne diese Variable blockt Homepage ≥v0.234 fremde Hostnamen
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-*}
    # Container-Status über dockerproxy (Homepage läuft als PUID 99 und kommt
    # nicht an den root:docker-Socket; der Proxy löst das sauber & read-only).
    depends_on:
      - dockerproxy
    networks:
      - arr_net

  # docker-socket-proxy — stellt Homepage eine schreibgeschützte Docker-API
  # bereit (http://dockerproxy:2375), damit Homepage den Container-Status
  # anzeigen kann, ohne den root-Socket direkt zu mounten.
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1   # nur Container lesen; alles andere bleibt gesperrt
      - POST=0         # keine schreibenden Aufrufe
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arr_net

  # ==========================================================================
  # VAULTWARDEN — deaktiviert (--profile vaultwarden), Einrichtung folgt später
  # DOMAIN darf NICHT leer übergeben werden (Crash ab 1.35) — Default ist die
  # lokale HTTP-URL; für Bitwarden-Clients später VW_DOMAIN auf HTTPS setzen.
  # ==========================================================================
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    profiles:
      - vaultwarden
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=${VW_SIGNUPS_ALLOWED:-true}
      - ADMIN_TOKEN=${VW_ADMIN_TOKEN:-}
      - DOMAIN=${VW_DOMAIN:-http://${UNRAID_IP:-192.168.1.100}:${VAULTWARDEN_PORT:-8082}}
      - LOG_LEVEL=warn
    ports:
      - "${VAULTWARDEN_PORT:-8082}:80"
    volumes:
      - vaultwarden_data:/data
    networks:
      - arr_net
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # ADGUARD HOME — lokaler DNS: löst jellyfin.fritz.box & Co. auf die
  # Server-IP auf (Rewrites via bootstrap/09-adguard.sh) + Werbeblocker.
  # Dafür muss im Router (Fritz!Box) der lokale DNS-Server auf ${UNRAID_IP}
  # zeigen: Heimnetz → Netzwerk → Netzwerkeinstellungen → IPv4 → lokaler DNS.
  # ==========================================================================
  adguardhome:
    image: adguard/adguardhome:v0.107.78
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - "${UNRAID_IP}:53:53/tcp"
      - "${UNRAID_IP}:53:53/udp"
      - "${ADGUARD_SETUP_PORT:-3001}:3000"
      - "${ADGUARD_WEBUI_PORT:-8081}:80"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    cap_add:
      - NET_ADMIN
    networks:
      - arr_net

  # ==========================================================================
  # THREADFIN — deaktiviert (--profile iptv), Einrichtung folgt später
  # Kein verlässliches Versions-Tag im Docker Hub → Pin per Digest.
  # ==========================================================================
  # gluetun = VPN-Gateway (Split-Tunnel) für Threadfin (Live TV, --profile iptv)
  # UND qBittorrent (Torrents, --profile torrent). Beide teilen sich den
  # Netzwerk-Stack (network_mode: service:gluetun) → ihr Traffic läuft durch
  # Premiumize, der restliche Stack bleibt direkt. Killswitch: fällt das VPN
  # aus, haben beide keine Verbindung (kein Leak über die echte IP).
  #
  # Voraussetzung: OpenVPN-Config von premiumize.me/plugins als
  # ${APPDATA}/gluetun/premiumize.ovpn ablegen; Zugang in .env (PREMIUMIZE_*).
  # Die Ports der Insassen werden HIER veröffentlicht (sie haben keinen eigenen
  # Netzwerk-Namen mehr → aus arr_net erreichbar als http://gluetun:<port>).
  gluetun:
    image: qmcgaw/gluetun@sha256:b0ee2135e6ba52ad3f102aae9663707cd1c9531485117067a380d3b2b6dd991d
    container_name: gluetun
    restart: unless-stopped
    profiles:
      - iptv
      - torrent
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${THREADFIN_PORT:-34400}:34400"   # Threadfin  (Profil iptv)
      - "${QBIT_PORT:-8085}:8080"          # qBittorrent WebUI (Profil torrent)
    volumes:
      - gluetun_data:/gluetun
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/premiumize.ovpn
      - OPENVPN_USER=${PREMIUMIZE_VPN_USER:-}
      - OPENVPN_PASSWORD=${PREMIUMIZE_VPN_PASSWORD:-}
      # Damit arr_net (Jellyfin/Sonarr) die Insassen-Ports erreicht, ohne dass
      # diese Antworten durchs VPN müssen:
      - FIREWALL_INPUT_PORTS=34400,8080
      - FIREWALL_OUTBOUND_SUBNETS=${ARR_NET_SUBNET:-172.18.0.0/16}
    networks:
      - arr_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://ipinfo.io/ip >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  # qBittorrent — Torrent-Client, läuft im gluetun-Netz-Stack (aller Traffic
  # durchs VPN). Aus arr_net/Sonarr erreichbar als http://gluetun:8080.
  # Nutzt dasselbe /data wie Sonarr → Hardlinks von /data/downloads/torrents
  # nach /data/media. Erst-Setup + Sonarr-Verdrahtung: bootstrap/12-torrent.sh.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.3_v2.0.13-ls468
    container_name: qbittorrent
    restart: unless-stopped
    profiles:
      - torrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - TZ=${TZ:-Europe/Berlin}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_data:/config
      - ${DATA}:/data

  # FlareSolverr — löst Cloudflare-Challenges für Prowlarr-Indexer (1337x,
  # XXXClub …). Kein VPN nötig; Prowlarr erreicht es als http://flaresolverr:8191.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    restart: unless-stopped
    profiles:
      - torrent
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Berlin}
    networks:
      - arr_net

  threadfin:
    image: fyb3roptik/threadfin@sha256:863fb0c2945617b4aa48b79eaa655954df72d68fbee6e49a1465934ceb3f057e
    container_name: threadfin
    <<: *common
    profiles:
      - iptv
    # Kein eigenes networks:/ports: — Threadfin nutzt den Netz-Stack von gluetun,
    # damit ALLER Threadfin-Traffic durchs Premiumize-VPN läuft.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - threadfin_conf:/home/threadfin/conf
      - threadfin_temp:/tmp/threadfin:rw

  # ==========================================================================
  # LIDARR / READARR — deaktiviert; vor einer Aktivierung Version pinnen!
  # ==========================================================================
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest # vor Aktivierung pinnen
    container_name: lidarr
    <<: *common
    profiles:
      - lidarr
    ports:
      - "${LIDARR_PORT:-8686}:8686"
    volumes:
      - lidarr_data:/config
      - ${DATA}:/data
    networks:
      - arr_net

  readarr:
    image: lscr.io/linuxserver/readarr:develop # vor Aktivierung pinnen
    container_name: readarr
    <<: *common
    profiles:
      - readarr
    ports:
      - "${READARR_PORT:-8787}:8787"
    volumes:
      - readarr_data:/config
      - ${DATA}:/data
    networks:
      - arr_net
